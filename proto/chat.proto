syntax = "proto3";

package mmorpg;

option csharp_namespace = "AIMMO.Proto";

import "common.proto";

enum ChatChannel {
  CHAT_CHANNEL_UNKNOWN = 0;
  CHAT_CHANNEL_WORLD = 1;
  CHAT_CHANNEL_SCENE = 2;
}

message C2S_ChatReq {
  ChatChannel channel = 1;
  string text = 2;
}

message S2C_ChatNtf {
  ErrorCode code = 1;
  ChatChannel channel = 2;
  int64 sender_role_id = 3;
  string sender_name = 4;
  string text = 5;
  int64 server_time = 6;
}

