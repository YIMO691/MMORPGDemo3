syntax = "proto3";

package mmorpg;

option csharp_namespace = "AIMMO.Proto";

import "common.proto";

message C2S_CastSkillReq {
  int32 scene_id = 1;
  int32 skill_id = 2;
  int64 target_entity_id = 3;
  Vector3 aim_position = 4;
}

message CombatHit {
  int64 source_entity_id = 1;
  int64 target_entity_id = 2;
  int32 skill_id = 3;
  int32 hp_delta = 4;
  bool is_dead = 5;
}

message S2C_CombatEventNtf {
  int32 scene_id = 1;
  int64 server_tick = 2;
  repeated CombatHit hits = 3;
}

